<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <title>Livi and Brenny's Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>


    <div id="breaktimes">
    <h1 onclick="pomodoro(this)">Pomodoro</h1>
    <h1 onclick="shortbreak(this)">Short Break</h1>
    <h1 onclick="longbreak(this)">Long Break</h1>
    </div>

    <div id="container">
        <div id="display">
            25:00
        </div>
        <div id="controls">
            <button id="start" onclick="start()">Start</button>
            <button id="stop" onclick="stop()">Stop</button>
            <button id="reset" onclick="reset()">Reset</button>
            <button id="skip" onclick="skip()">Skip</button>
        </div>
        <div id="tomatoCounter">
            Completed this session: <span id="tomatoCounterValue">0</span>
        </div>
        <div id="skipCounter">
            Skipped this session: <span id="skipCounterValue">0</span>
        </div>

    </div>

</body>


<script src="pomo.js"></script>
</html>
